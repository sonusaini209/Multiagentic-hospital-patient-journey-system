<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hospital Patient Journey System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --surface2: #f0ede6;
      --border: #e2ddd5;
      --ink: #1a1814;
      --muted: #8a8478;
      --muted2: #bdb8b0;
      --accent: #1a6b4a;
      --accent-soft: rgba(26,107,74,0.08);
      --accent-border: rgba(26,107,74,0.25);
      --red: #c0392b;
      --red-soft: rgba(192,57,43,0.08);
      --orange: #d4670a;
      --orange-soft: rgba(212,103,10,0.08);
      --blue: #1a4a8a;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── NAV ── */
    nav {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo-cross {
      width: 20px; height: 20px;
      background: var(--accent);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .nav-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
    }

    .online-dot {
      width: 7px; height: 7px;
      background: #3dba7e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 56px);
    }

    /* ── SIDEBAR ── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 1.2rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 0.8rem;
    }

    .patient-card {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.65rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.12s;
      border: 1px solid transparent;
      margin-bottom: 0.3rem;
    }

    .patient-card:hover { background: var(--surface2); }

    .patient-card.active {
      background: var(--accent-soft);
      border-color: var(--accent-border);
    }

    .patient-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }

    .patient-card.active .patient-avatar {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .patient-info { flex: 1; min-width: 0; }

    .patient-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .patient-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active  { background: #3dba7e; }
    .status-dot.icu     { background: var(--red); animation: pulse 1s infinite; }
    .status-dot.discharged { background: var(--muted2); }

    /* ── QUICK QUERIES ── */
    .quick-btn {
      width: 100%;
      text-align: left;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.55rem 0.8rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }

    .quick-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── MAIN ── */
    .main {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 56px);
    }

    /* ── CHAT AREA ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem;
    }

    .empty-icon {
      width: 64px; height: 64px;
      background: var(--accent-soft);
      border: 1.5px solid var(--accent-border);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 1.2rem;
    }

    .empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    .empty-sub {
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 360px;
      line-height: 1.6;
    }

    /* ── MESSAGES ── */
    .message { display: flex; gap: 0.8rem; animation: fadeUp 0.25s ease; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
    }

    .message.user .msg-avatar { background: var(--ink); color: white; }
    .message.assistant .msg-avatar { background: var(--accent); color: white; }

    .msg-bubble {
      max-width: 75%;
      padding: 0.9rem 1.1rem;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .message.user .msg-bubble {
      background: var(--ink);
      color: white;
      border-radius: 12px 2px 12px 12px;
    }

    .message.assistant .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px 12px 12px 12px;
      color: var(--ink);
    }

    .msg-bubble strong { font-weight: 600; }

    .critical-flag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--red-soft);
      border: 1px solid rgba(192,57,43,0.2);
      color: var(--red);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    .msg-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted2);
      margin-top: 0.3rem;
      text-align: right;
    }

    .message.user .msg-time { text-align: left; }

    /* ── TYPING ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.8rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px 12px 12px 12px;
      width: fit-content;
    }

    .typing-dot {
      width: 6px; height: 6px;
      background: var(--muted2);
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    .typing-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 1rem 2rem 1.2rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .selected-patient-tag {
      display: none;
      align-items: center;
      gap: 0.4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .selected-patient-tag.visible { display: flex; }

    .tag-pill {
      background: var(--accent-soft);
      border: 1px solid var(--accent-border);
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      font-size: 0.68rem;
    }

    .input-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }

    .query-input {
      flex: 1;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .query-input:focus { border-color: var(--accent); }
    .query-input::placeholder { color: var(--muted2); }

    .send-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: #145a3d; transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .reset-btn {
      height: 44px;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 0 0.9rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .reset-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── AGENT STEPS ── */
    .agent-steps {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .agent-step {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      border: 1px solid;
    }

    .agent-step.admitcore  { background: rgba(26,74,138,0.08); border-color: rgba(26,74,138,0.2); color: var(--blue); }
    .agent-step.labtrack   { background: var(--orange-soft); border-color: rgba(212,103,10,0.2); color: var(--orange); }
    .agent-step.pharmaflow { background: var(--accent-soft); border-color: var(--accent-border); color: var(--accent); }
    .agent-step.billdesk   { background: rgba(100,60,140,0.08); border-color: rgba(100,60,140,0.2); color: #643c8c; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      aside { display: none; }
      .chat-area { padding: 1rem; }
      .input-bar { padding: 0.8rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="logo">
      <div class="logo-cross">✚</div>
      Hospital Patient Journey
    </div>
    <div class="nav-right">
      <span class="nav-badge">MULTI-AGENT SYSTEM</span>
      <div class="online-dot"></div>
    </div>
  </nav>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside>
      <div class="sidebar-section">
        <div class="sidebar-label">Patients</div>
        <div id="patientList">
          <div style="font-size:0.8rem;color:var(--muted2);text-align:center;padding:1rem">Loading...</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Quick Queries</div>
        <button class="quick-btn" onclick="quickQuery('What is my current ward, doctor, and admission reason?')">🏥 Ward & Admission Info</button>
        <button class="quick-btn" onclick="quickQuery('What are my latest lab test results?')">🧪 Lab Test Results</button>
        <button class="quick-btn" onclick="quickQuery('What medicines have been prescribed to me?')">💊 Prescriptions</button>
        <button class="quick-btn" onclick="quickQuery('What is my total bill and how much is pending?')">💰 Bill & Payment</button>
        <button class="quick-btn" onclick="quickQuery('Does my insurance cover my current bill?')">🛡️ Insurance Coverage</button>
        <button class="quick-btn" onclick="quickQuery('Give me a complete summary of my patient journey.')">📋 Full Summary</button>
      </div>
    </aside>

    <!-- MAIN CHAT -->
    <div class="main">
      <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🏥</div>
          <div class="empty-title">Patient Journey Assistant</div>
          <div class="empty-sub">Select a patient from the sidebar and ask about their admission, lab results, prescriptions, or billing.</div>
        </div>
      </div>

      <div class="input-bar">
        <div class="selected-patient-tag" id="selectedTag">
          <span>Querying for</span>
          <span class="tag-pill" id="selectedTagText"></span>
        </div>
        <div class="input-row">
          <textarea class="query-input" id="queryInput" placeholder="Ask about a patient's journey..." rows="1"></textarea>
          <button class="reset-btn" onclick="resetChat()" title="Reset conversation">Reset</button>
          <button class="send-btn" id="sendBtn" onclick="sendQuery()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API = ['localhost','127.0.0.1'].includes(location.hostname) ? 'http://localhost:8000' : '';
    let selectedPatient = null;

    // ── Load patients ──────────────────────────────────────────
    async function loadPatients() {
      try {
        const res = await fetch(`${API}/api/patients`);
        const data = await res.json();
        renderPatients(data.patients);
      } catch(e) {
        document.getElementById('patientList').innerHTML =
          '<div style="font-size:0.75rem;color:var(--red);padding:0.5rem">Failed to load patients</div>';
      }
    }

    function getInitials(name) {
      return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
    }

    function renderPatients(patients) {
      const list = document.getElementById('patientList');
      list.innerHTML = '';
      patients.forEach(p => {
        const card = document.createElement('div');
        card.className = 'patient-card';
        card.dataset.id = p.id;
        const statusClass = p.status.toLowerCase();
        card.innerHTML = `
          <div class="patient-avatar">${getInitials(p.name)}</div>
          <div class="patient-info">
            <div class="patient-name">${p.name}</div>
            <div class="patient-meta">${p.id} · ${p.ward}</div>
          </div>
          <div class="status-dot ${statusClass}" title="${p.status}"></div>`;
        card.onclick = () => selectPatient(p);
        list.appendChild(card);
      });
    }

    function selectPatient(p) {
      selectedPatient = p;
      document.querySelectorAll('.patient-card').forEach(c => c.classList.remove('active'));
      document.querySelector(`[data-id="${p.id}"]`).classList.add('active');
      document.getElementById('selectedTag').classList.add('visible');
      document.getElementById('selectedTagText').textContent = `${p.name} (${p.id})`;
      document.getElementById('queryInput').placeholder = `Ask about ${p.name}...`;
      hideEmpty();
    }

    function quickQuery(text) {
      if (!selectedPatient) {
        showToast('Please select a patient first');
        return;
      }
      document.getElementById('queryInput').value = text;
      sendQuery();
    }

    // ── Chat ───────────────────────────────────────────────────
    function hideEmpty() {
      const e = document.getElementById('emptyState');
      if (e) e.style.display = 'none';
    }

    function appendMessage(role, content, agents=[]) {
      hideEmpty();
      const area = document.getElementById('chatArea');
      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;

      const time = new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
      const avatar = role === 'user'
        ? `<div class="msg-avatar">${selectedPatient ? getInitials(selectedPatient.name) : 'U'}</div>`
        : `<div class="msg-avatar">AI</div>`;

      const hasCritical = content.includes('⚠️') || content.toLowerCase().includes('critical');
      const criticalBadge = hasCritical && role === 'assistant'
        ? `<div class="critical-flag">⚠ Critical Finding</div>` : '';

      let agentTags = '';
      if (agents.length && role === 'assistant') {
        agentTags = `<div class="agent-steps">${agents.map(a =>
          `<span class="agent-step ${a}">${a}</span>`).join('')}</div>`;
      }

      const formatted = content
        .replace(/\n/g, '<br>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      wrapper.innerHTML = `
        ${avatar}
        <div>
          ${criticalBadge}
          ${agentTags}
          <div class="msg-bubble">${formatted}</div>
          <div class="msg-time">${time}</div>
        </div>`;

      area.appendChild(wrapper);
      area.scrollTop = area.scrollHeight;
    }

    function showTyping() {
      hideEmpty();
      const area = document.getElementById('chatArea');
      const el = document.createElement('div');
      el.className = 'message assistant';
      el.id = 'typingIndicator';
      el.innerHTML = `
        <div class="msg-avatar">AI</div>
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <span class="typing-label">Agents working...</span>
        </div>`;
      area.appendChild(el);
      area.scrollTop = area.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendQuery() {
      const input = document.getElementById('queryInput');
      const query = input.value.trim();
      if (!query) return;
      if (!selectedPatient) { showToast('Please select a patient first'); return; }

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;

      appendMessage('user', query);
      showTyping();

      try {
        const res = await fetch(`${API}/api/query`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `I am patient ${selectedPatient.id} (${selectedPatient.name}). ${query}`,
            patient_id: selectedPatient.id,
            remember: true
          })
        });

        if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
        const data = await res.json();
        hideTyping();

        // Guess which agents were used from content
        const ans = data.answer.toLowerCase();
        const agents = [];
        if (ans.includes('ward') || ans.includes('admission') || ans.includes('doctor')) agents.push('admitcore');
        if (ans.includes('test') || ans.includes('result') || ans.includes('lab')) agents.push('labtrack');
        if (ans.includes('medicine') || ans.includes('prescri') || ans.includes('dosage')) agents.push('pharmaflow');
        if (ans.includes('bill') || ans.includes('insurance') || ans.includes('₹') || ans.includes('amount')) agents.push('billdesk');

        appendMessage('assistant', data.answer, agents);
      } catch(err) {
        hideTyping();
        appendMessage('assistant', `Sorry, something went wrong: ${err.message}`);
      } finally {
        document.getElementById('sendBtn').disabled = false;
      }
    }

    async function resetChat() {
      try {
        await fetch(`${API}/api/reset`, { method: 'POST', headers: {'Content-Type':'application/json'} });
        const area = document.getElementById('chatArea');
        area.innerHTML = `
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">🏥</div>
            <div class="empty-title">Patient Journey Assistant</div>
            <div class="empty-sub">Select a patient from the sidebar and ask about their admission, lab results, prescriptions, or billing.</div>
          </div>`;
        showToast('Conversation reset');
      } catch(e) { showToast('Reset failed'); }
    }

    // ── Toast ──────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.createElement('div');
      t.style.cssText = `position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.82rem;font-family:'IBM Plex Mono',monospace;z-index:999;animation:fadeUp 0.2s ease`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    // ── Auto-resize textarea ───────────────────────────────────
    document.getElementById('queryInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('queryInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
    });

    // ── Init ───────────────────────────────────────────────────
    loadPatients();
  </script>
</body>
</html>
